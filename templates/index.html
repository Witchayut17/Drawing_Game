<!DOCTYPE html>
<html>

<head>
    <title>FastDraw</title>

    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --secondary: #eca548;
            --bg-dark: #0f172a;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-muted: #94a3b8;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at top left, #1e1b4b, #0f172a);
            font-family: 'Inter', -apple-system, sans-serif;
            color: white;
            padding: 20px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .btn-secondary:active {
            background: var(--primary);
            color: white;
        }

        .game-container {
            height: auto;
            min-height: 400px;
            margin-bottom: 50px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            padding: 2rem;
            border-radius: 24px;
            width: 100%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 1.5rem;
            background: linear-gradient(to right, #818cf8, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }

        input {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            padding: 12px 16px;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        .btn-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        button {
            padding: 12px;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        button:active {
            transform: scale(0.95);
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.4);
        }

        .btn-secondary {
            background: var(--glass-bg);
            color: white;
            border: 1px solid var(--glass-border);
            padding: 20px;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .btn-accent {
            background: var(--secondary);
            color: white;
            width: 100%;
            margin-top: 10px;
            padding: 30px;
        }

        .canvas-wrapper {
            position: relative;
            margin: 20px 0;
            display: inline-block;
        }

        canvas {
            background: #ffffff;
            border-radius: 16px;
            cursor: crosshair;
            touch-action: none;
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.1);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 15px 0;
            font-size: 0.9rem;
        }

        .stat-card {
            background: rgba(0, 0, 0, 0.2);
            padding: 10px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
        }

        #timer {
            font-size: 1.5rem;
            color: #fbbf24;
            font-weight: bold;
            margin: 5px 0;
        }

        #classDisplay {
            color: #22d3ee;
            font-size: 1.2rem;
            margin: 10px 0;
            font-weight: 700;
        }

        #result {
            margin-top: 15px;
            padding: 15px;
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.3);
            font-size: 0.85rem;

            height: auto;
            max-height: none;
            overflow-y: visible;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        @media (max-width: 480px) {
            .game-container {
                padding: 1.5rem;
                border-radius: 0;
                max-width: 100%;
                height: 100vh;
                display: flex;
                flex-direction: column;
                justify-content: center;
            }

            canvas {
                width: 100% !important;
                height: auto !important;
            }
        }
    </style>

</head>

<body>

    <div class="game-container">
        <h1>FastDraw AI</h1>

        <div class="input-group">
            <input id="nameInput" placeholder="Name" autocomplete="off">
            <input id="roomInput" placeholder="Room Code">
            <div class="btn-row">
                <button class="btn-secondary" onclick="createRoom()">Create</button>
                <button class="btn-secondary" onclick="joinRoom()">Join</button>
            </div>
            <button id="startBtn" class="btn-primary" style="width:100%; display:none;" onclick="startGame()">Start
                Game</button>
        </div>

        <div id="roomStatus" style="font-size: 0.8rem; color: var(--text-muted);">Not in a room</div>

        <div class="stats-grid">
            <div class="stat-card">
                <div style="color: var(--text-muted)">Target</div>
                <div id="classDisplay">---</div>
            </div>
            <div class="stat-card">
                <div style="color: var(--text-muted)">Time Left</div>
                <div id="timer">15</div>
            </div>
        </div>

        <div class="canvas-wrapper">
            <canvas id="canvas" width="280" height="280"></canvas>
        </div>

        <div class="btn-row">
            <button class="btn-secondary" onclick="clearCanvas()">Clear</button>
            <button id="submitBtn" class="btn-accent" onclick="submitDrawing()">Submit</button>
        </div>

        <div id="result">Waiting for players...</div>
        <div id="drawingViewer"></div>

        <div id="playerList" style="margin-top:15px; font-size: 0.8rem; text-align: left;"></div>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="/static/script.js"></script>

</body>

</html>
